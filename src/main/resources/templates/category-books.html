<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${genre} + ' - Книги'">Книги жанра</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #fef8f1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .content-wrapper {
            flex: 1 0 auto;
            background-color: #fef8f1;
            padding: 40px 0;
        }
        .book-card {
            background: transparent;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            margin-bottom: 30px;
            height: 100%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15);
        }
        .book-cover {
            width: 100%;
            background-color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            border-radius: 12px 12px 0 0;
            aspect-ratio: 3 / 4;
        }
        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .book-cover:hover img {
            transform: scale(1.02);
        }
        .book-card-body {
            background: transparent;
            padding: 12px 12px 16px;
            border-radius: 0 0 12px 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .book-title {
            font-size: 0.95rem;
            font-weight: bold;
            color: #2c3e50;
            line-height: 1.3;
            margin-bottom: 4px;
        }
        .book-author {
            color: #6c757d;
            font-size: 0.8rem;
            margin-bottom: 6px;
        }
        .rating {
            color: #ffc107;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }
        .btn-order {
            background-color: #489aea;
            border-color: #489aea;
            color: white;
            border-radius: 30px;
            font-size: 0.85rem;
            padding: 6px 12px;
        }
        .btn-order:hover {
            background-color: #3a7bc4;
        }
        .btn-edit {
            background-color: #f0ad4e;
            border-color: #f0ad4e;
            color: white;
            border-radius: 30px;
            font-size: 0.85rem;
            padding: 6px 12px;
        }
        .btn-edit:hover {
            background-color: #ec971f;
        }
        .copies-info {
            margin-top: 8px;
            font-size: 0.75rem;
        }
        .action-group {
            margin-top: auto;
        }
        footer {
            flex-shrink: 0;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="content-wrapper">
    <div class="container">
        <h1 class="mb-4">Книги жанра: <span th:text="${genre}"></span></h1>
        <div class="row">
            <div th:each="book : ${books}" class="col-md-2 col-sm-4 col-6">
                <div class="book-card">
                    <div class="book-cover">
                        <a th:href="@{/book/{id}(id=${book.id})}">
                            <img th:src="${book.coverUrl != null ? book.coverUrl + '?v=' + coverVersion : '/images/books/' + book.id + '.jpg'}"
                                 alt="Обложка" onerror="this.src='/images/default-cover.jpg'">
                        </a>
                    </div>
                    <div class="book-card-body">
                        <h5 class="book-title" th:text="${book.title}">Название</h5>
                        <p class="book-author" th:text="${book.author}">Автор</p>
                        <div class="rating">
                            <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                        </div>
                        <div class="action-group">
                            <div sec:authorize="hasRole('LIBRARIAN') or hasRole('ADMIN')">
                                <a th:href="@{/edit/{id}(id=${book.id})}" class="btn btn-edit w-100"><i class="bi bi-pencil"></i> Редактировать</a>
                            </div>
                            <div sec:authorize="hasRole('STUDENT') or hasRole('TEACHER')">
                                <form th:action="@{/requests/create/{id}(id=${book.id})}" method="post" class="order-form">
                                    <button type="submit" class="btn btn-order w-100 order-btn" th:data-book-title="${book.title}">
                                        <i class="bi bi-cart-plus"></i> Заказать
                                    </button>
                                </form>
                            </div>
                            <div sec:authorize="!isAuthenticated()">
                                <a href="/login" class="btn btn-order w-100"><i class="bi bi-box-arrow-in-right"></i> Заказать</a>
                            </div>
                            <div class="copies-info text-center">
                                <small th:if="${book.copies > 0}" class="text-success">В наличии: <span th:text="${book.copies}"></span> шт.</small>
                                <small th:if="${book.copies == 0}" class="text-danger">Нет в наличии</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <a href="/" class="btn btn-secondary mt-4">← На главную</a>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.querySelectorAll('.order-form').forEach(form => {
        form.addEventListener('submit', function(e) {
            const btn = this.querySelector('.order-btn');
            const bookTitle = btn.getAttribute('data-book-title');
            if (!confirm(`Вы действительно хотите заказать книгу "${bookTitle}"?`)) {
                e.preventDefault();
            }
        });
    });
</script>
</body>
</html>
