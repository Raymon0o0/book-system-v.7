<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background-image: url('/images/library.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 140px);
            padding: 20px;
        }
        .login-container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.25);
            max-width: 400px;
            width: 100%;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="login-wrapper">
    <div class="login-container">
        <div class="text-center mb-4">
            <i class="bi bi-book" style="font-size: 3rem; color: #3498db;"></i>
            <h3 class="mt-3">Библиотечная система</h3>
            <p class="text-muted">Вход в личный кабинет</p>
        </div>
        <div th:if="${param.error}" class="alert alert-danger">Неверное имя пользователя или пароль</div>
        <div th:if="${param.logout}" class="alert alert-success">Вы успешно вышли из системы</div>
        <div th:if="${param.registered}" class="alert alert-success">Регистрация успешна! Теперь вы можете войти.</div>
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Имя пользователя</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3"><i class="bi bi-box-arrow-in-right"></i> Войти</button>
            <div class="text-center">
                <p class="mb-0">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
                <p class="mb-0"><a href="/">Вернуться на главную</a></p>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
