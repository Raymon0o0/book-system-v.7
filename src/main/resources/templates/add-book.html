<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавить книгу</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background-image: url('/images/library.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .content-wrapper {
            flex: 1 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }
        .form-wrapper {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 100%;
        }
        footer {
            flex-shrink: 0;
        }
        .preview-img {
            max-width: 100px;
            max-height: 100px;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="content-wrapper">
    <div class="form-wrapper">
        <h2 class="mb-4"><i class="bi bi-book"></i> Добавление новой книги</h2>
        <form th:action="@{/save}" th:object="${book}" method="post" enctype="multipart/form-data">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Название книги *</label>
                    <input type="text" class="form-control" th:field="*{title}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Автор *</label>
                    <input type="text" class="form-control" th:field="*{author}" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Жанр *</label>
                    <select class="form-select" th:field="*{genre}" required>
                        <option value="">Выберите жанр...</option>
                        <option value="Роман">Роман</option>
                        <option value="Детектив">Детектив</option>
                        <option value="Фантастика">Фантастика</option>
                        <option value="Фэнтези">Фэнтези</option>
                        <option value="Научная литература">Научная литература</option>
                        <option value="Поэзия">Поэзия</option>
                        <option value="Драма">Драма</option>
                        <option value="Комедия">Комедия</option>
                        <option value="Исторический">Исторический</option>
                        <option value="Биография">Биография</option>
                        <option value="Учебная литература">Учебная литература</option>
                    </select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Год издания</label>
                    <input type="number" class="form-control" th:field="*{publicationYear}" min="1000" max="2024">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Копии *</label>
                    <input type="number" class="form-control" th:field="*{copies}" min="1" value="1" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label">Обложка (файл)</label>
                    <input type="file" class="form-control" name="coverFile" accept="image/jpeg,image/png,image/jpg">
                    <div class="form-text">Загрузите изображение обложки (jpg, png). Если не выбрано, будет использована стандартная обложка.</div>
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label">Или URL обложки</label>
                    <input type="url" class="form-control" th:field="*{coverUrl}" placeholder="https://example.com/cover.jpg">
                    <div class="form-text">Можно указать ссылку на изображение в интернете.</div>
                </div>
            </div>
            <div class="mt-4 pt-3 border-top">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> Сохранить книгу</button>
                <a href="/" class="btn btn-secondary"><i class="bi bi-x-circle"></i> Отмена</a>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
