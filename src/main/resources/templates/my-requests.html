<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои заявки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body { background-image: url('/images/library.jpg'); background-size: cover; background-attachment: fixed; background-position: center; min-height: 100vh; }
        .requests-container { background-color: rgba(255, 255, 255, 0.97); border-radius: 15px; padding: 30px; margin-top: 30px; box-shadow: 0 0 30px rgba(0, 0, 0, 0.25); }
        .request-item { background-color: #f8f9fa; border-radius: 8px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #007bff; }
        .request-item.pending { border-left-color: #ffc107; }
        .request-item.approved { border-left-color: #28a745; }
        .request-item.borrowed { border-left-color: #007bff; }
        .request-item.returned { border-left-color: #6c757d; }
        .request-item.rejected { border-left-color: #dc3545; }
        .status-badge { font-size: 0.9rem; padding: 6px 12px; border-radius: 20px; font-weight: 500; }
        .badge-pending { background-color: #ffc107; color: #000; }
        .badge-approved { background-color: #28a745; color: #fff; }
        .badge-borrowed { background-color: #007bff; color: #fff; }
        .badge-returned { background-color: #6c757d; color: #fff; }
        .badge-rejected { background-color: #dc3545; color: #fff; }
        .badge-cancelled { background-color: #6c757d; color: #fff; }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container">
    <div class="requests-container">
        <h1 class="mb-4"><i class="bi bi-journal-bookmark-fill me-2"></i> Мои заявки на книги</h1>
        <div th:if="${success}" class="alert alert-success"><span th:text="${success}"></span></div>
        <div th:if="${error}" class="alert alert-danger"><span th:text="${error}"></span></div>

        <div th:each="req : ${requests}">
            <div class="request-item" th:classappend="${req.status.toLowerCase()}">
                <div class="row">
                    <div class="col-md-8">
                        <h5 th:text="${req.bookTitle}">Название книги</h5>
                        <p><strong>Автор:</strong> <span th:text="${req.bookAuthor}"></span></p>
                        <p><strong>Статус:</strong>
                            <span th:if="${req.status == 'PENDING'}" class="badge badge-pending">Ожидает</span>
                            <span th:if="${req.status == 'APPROVED'}" class="badge badge-approved">Одобрена</span>
                            <span th:if="${req.status == 'BORROWED'}" class="badge badge-borrowed">Выдана</span>
                            <span th:if="${req.status == 'RETURNED'}" class="badge badge-returned">Возвращена</span>
                            <span th:if="${req.status == 'REJECTED'}" class="badge badge-rejected">Отклонена</span>
                            <span th:if="${req.status == 'CANCELLED'}" class="badge badge-cancelled">Отменена</span>
                        </p>
                        <p th:if="${req.pickupDate}"><strong>Дата выдачи/получения:</strong> <span th:text="${#temporals.format(req.pickupDate, 'dd.MM.yyyy')}"></span></p>
                        <p th:if="${req.returnDate}"><strong>Дата возврата:</strong> <span th:text="${#temporals.format(req.returnDate, 'dd.MM.yyyy')}"></span></p>
                        <p th:if="${req.notes}"><strong>Примечание:</strong> <span th:text="${req.notes}"></span></p>
                        <p class="text-muted"><small>Заявка создана: <span th:text="${#temporals.format(req.requestDate, 'dd.MM.yyyy HH:mm')}"></span></small></p>
                    </div>
                    <div class="col-md-4 text-end">
                        <form th:if="${req.status == 'PENDING'}" th:action="@{/requests/cancel/{id}(id=${req.id})}" method="post">
                            <button type="submit" class="btn btn-outline-danger" onclick="return confirm('Отменить заявку?')">Отменить заявку</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${requests == null or requests.isEmpty()}" class="alert alert-info">У вас пока нет заявок.</div>
        <div class="mt-4"><a href="/" class="btn btn-primary"><i class="bi bi-arrow-left"></i> На главную</a></div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
