<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Список пользователей</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background-image: url('/images/library.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .content-wrapper {
            flex: 1 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }
        .users-container {
            background-color: rgba(255, 255, 255, 0.97);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 1200px;
        }
        .user-card {
            border-left: 4px solid #3498db;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }
        .role-badge { font-size: 0.8rem; padding: 4px 8px; margin: 2px; }
        .role-student { background-color: #28a745; color: white; }
        .role-teacher { background-color: #17a2b8; color: white; }
        .role-librarian { background-color: #ffc107; color: #000; }
        .role-admin { background-color: #dc3545; color: white; }
        footer {
            flex-shrink: 0;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="content-wrapper">
    <div class="users-container">
        <h1 class="mb-4"><i class="bi bi-people me-2"></i> Управление пользователями</h1>
        <div th:if="${success}" class="alert alert-success"><i class="bi bi-check-circle"></i> <span th:text="${success}"></span></div>
        <div th:if="${error}" class="alert alert-danger"><i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span></div>

        <div class="row">
            <div th:each="user : ${users}" class="col-md-6">
                <div class="card user-card mb-3">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-8">
                                <h5 class="card-title" th:text="${user.fullName} ?: ${user.username}">ФИО</h5>
                                <p class="card-text mb-1"><strong>Логин:</strong> <span th:text="${user.username}"></span></p>
                                <p class="card-text mb-1"><strong>Email:</strong> <span th:text="${user.email}"></span></p>
                                <p th:if="${user.studentId}" class="card-text mb-1"><strong>Студенческий:</strong> <span th:text="${user.studentId}"></span></p>
                                <p th:if="${user.faculty}" class="card-text mb-1"><strong>Факультет:</strong> <span th:text="${user.faculty}"></span></p>
                                <p class="card-text mb-1"><strong>Зарегистрирован:</strong> <span th:text="${#temporals.format(user.createdAt, 'dd.MM.yyyy')}"></span></p>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-2">
                                    <strong>Роли:</strong>
                                    <div>
                                        <span th:each="role : ${user.roles}" class="badge role-badge" th:classappend="'role-' + ${role.name.toString().toLowerCase().replace('role_', '')}" th:text="${role.name.toString().replace('ROLE_', '')}"></span>
                                    </div>
                                </div>
                                <div class="btn-group">
                                    <a th:href="@{/users/{id}(id=${user.id})}" class="btn btn-info btn-sm"><i class="bi bi-eye"></i></a>
                                    <a th:href="@{/users/edit/{id}(id=${user.id})}" class="btn btn-warning btn-sm"><i class="bi bi-pencil"></i></a>
                                    <form th:action="@{/users/delete/{id}(id=${user.id})}" method="post" style="display: inline;">
                                        <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Вы уверены, что хотите удалить пользователя?')"><i class="bi bi-trash"></i></button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${users == null or users.isEmpty()}" class="alert alert-info">Пользователи не найдены.</div>
        <div class="mt-4"><a href="/" class="btn btn-primary"><i class="bi bi-arrow-left"></i> На главную</a></div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
