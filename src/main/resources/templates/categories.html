<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Все категории книг</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #fef8f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .content-wrapper {
            background-color: #fef8f1;
            padding: 40px 0;
        }
        .section-title {
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: #da0200;
        }

        /* Жёсткое удаление фона */
        .category-card,
        .category-card *,
        .category-card:hover,
        .category-card:focus,
        .category-card:active,
        .category-card *:hover,
        a.category-card,
        a.category-card:hover,
        .row > [class*="col-"],
        .container,
        .row {
            background-color: transparent !important;
            background-image: none !important;
            background: none !important;
        }

        .category-card {
            text-align: center;
            text-decoration: none;
            display: block;
            margin-bottom: 30px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2) !important;
        }

        .category-img {
            width: 100%;
            height: auto;
            min-height: 240px;
            background: none !important;
            background-color: transparent !important;
            border-radius: 25px !important;
            display: block;
            margin: 0 auto;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2) !important;
            transition: box-shadow 0.2s, transform 0.2s;
        }

        .category-card:hover .category-img {
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3) !important;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="content-wrapper">
    <div class="container">
        <h1 class="section-title">Все категории книг</h1>
        <div class="row">
            <div th:each="genre : ${genres}" class="col-md-4 col-lg-3">
                <a th:href="@{/category/{genre}(genre=${genre[0]})}"
                   class="category-card">
                    <img th:src="'/images/categories/' + ${genre[0]} + '.png'"
                         th:alt="${genre[0]}"
                         class="category-img"
                         onerror="this.src='/images/default-category.png'">
                </a>
            </div>
        </div>
        <a href="/" class="btn btn-secondary mt-4">← На главную</a>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
