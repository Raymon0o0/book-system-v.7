<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Статистика библиотеки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background-image: url('/images/library.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .content-wrapper {
            flex: 1 0 auto;
            background-color: rgba(255, 255, 255, 0.97);
            border-radius: 15px;
            padding: 30px;
            margin: 30px auto;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.25);
            width: 90%;
            max-width: 1200px;
        }
        .stat-card {
            background: linear-gradient(135deg, #3498db, #2c3e50);
            color: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        .stat-number { font-size: 3rem; font-weight: bold; margin: 15px 0; }
        footer {
            flex-shrink: 0;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="content-wrapper">
    <h1 class="text-center mb-4"><i class="bi bi-graph-up text-primary"></i> Статистика библиотеки</h1>
    <div class="row mb-4">
        <div class="col-md-6"><div class="stat-card"><h3><i class="bi bi-book"></i> Всего книг</h3><div class="stat-number" th:text="${totalBooks}">0</div><p>уникальных наименований</p></div></div>
        <div class="col-md-6"><div class="stat-card"><h3><i class="bi bi-stack"></i> Всего экземпляров</h3><div class="stat-number" th:text="${totalCopies}">0</div><p>физических копий</p></div></div>
    </div>
    <div class="card mb-4"><div class="card-header bg-info text-white"><h5 class="mb-0"><i class="bi bi-bookmarks"></i> Книги по жанрам</h5></div><div class="card-body"><div class="row"><div th:each="entry : ${booksByGenre}" class="col-md-4 mb-3"><div class="border rounded p-3"><h6 th:text="${entry.key}">Жанр</h6><p class="mb-0"><span class="badge bg-primary" th:text="${entry.value}">0</span> книг</p></div></div></div></div></div>
    <div class="text-center"><a href="/" class="btn btn-primary btn-lg"><i class="bi bi-arrow-left"></i> На главную</a><a href="/add" class="btn btn-success btn-lg ms-3"><i class="bi bi-plus-circle"></i> Добавить книгу</a></div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
