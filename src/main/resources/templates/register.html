<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background-image: url('/images/library.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .register-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 140px);
            padding: 20px;
        }
        .register-container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.25);
            max-width: 600px;
            width: 100%;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="register-wrapper">
    <div class="register-container">
        <div class="text-center mb-4">
            <i class="bi bi-person-plus" style="font-size: 3rem; color: #28a745;"></i>
            <h3 class="mt-3">Регистрация нового пользователя</h3>
        </div>
        <div th:if="${error}" class="alert alert-danger"><span th:text="${error}"></span></div>
        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="mb-3"><label class="form-label">Логин *</label><input type="text" class="form-control" th:field="*{username}" required></div>
            <div class="mb-3"><label class="form-label">Email *</label><input type="email" class="form-control" th:field="*{email}" required></div>
            <div class="mb-3"><label class="form-label">Пароль *</label><input type="password" class="form-control" th:field="*{password}" required></div>
            <div class="mb-3"><label class="form-label">ФИО</label><input type="text" class="form-control" th:field="*{fullName}"></div>
            <div class="mb-3"><label class="form-label">Студенческий билет (если есть)</label><input type="text" class="form-control" th:field="*{studentId}"></div>
            <div class="mb-3"><label class="form-label">Факультет</label><input type="text" class="form-control" th:field="*{faculty}"></div>
            <div class="mb-3"><label class="form-label">Телефон</label><input type="tel" class="form-control" th:field="*{phoneNumber}"></div>
            <button type="submit" class="btn btn-success w-100 mb-3"><i class="bi bi-check-circle"></i> Зарегистрироваться</button>
            <div class="text-center">
                <p class="mb-0">Уже есть аккаунт? <a href="/login">Войти</a></p>
                <a href="/">Вернуться на главную</a>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
