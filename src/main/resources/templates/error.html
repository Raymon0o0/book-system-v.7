<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ошибка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #fef8f1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .error-container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }
        .error-image {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .btn-back {
            background-color: #d0954e;
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s;
            display: inline-block;
            border: none;
        }
        .btn-back:hover {
            background-color: #b87a3a;
            transform: translateY(-3px);
            color: white;
        }
    </style>
</head>
<body>
<div class="error-container">
    <img src="/images/error.jpg" alt="Ошибка" class="error-image" onerror="this.src='/images/default-cover.jpg'">
    <h2>Что-то пошло не так</h2>
    <p class="text-muted">Пожалуйста, вернитесь на главную страницу.</p>
    <a href="/" class="btn-back">← На главную</a>
</div>
</body>
</html>
